services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"  # internal only; not exposed to LAN
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    networks:
      - caravan

volumes:
  mqtt_data:
  mqtt_log:

networks:
  caravan:
    external: true
