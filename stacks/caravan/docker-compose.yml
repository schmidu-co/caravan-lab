services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: caravan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caravan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-caravan}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - caravan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caravan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/schmidu-co/caravan-web:latest
    container_name: caravan-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # cloudflared accesses via Docker network; 127.0.0.1 for local debug
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-caravan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-caravan}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      MQTT_HOST: ${MQTT_HOST:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - caravan

volumes:
  pg_data:

networks:
  caravan:
    external: true
